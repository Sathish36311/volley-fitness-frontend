<div class="card" style="max-width:520px;margin:0 auto;">
  <h2>Login</h2>
  <p style="color:var(--muted);">Access your plan once your profile is complete.</p>

  <div *ngIf="error" class="banner" style="margin-bottom:12px;">{{ error }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()" style="display:grid;gap:12px;">
    <label>
      Email
      <input class="input" type="email" formControlName="email" />
    </label>
    <label>
      Password
      <input class="input" type="password" formControlName="password" />
    </label>

    <button class="btn" type="submit" [disabled]="isSubmitting">
      <span *ngIf="!isSubmitting">Login</span>
      <span *ngIf="isSubmitting" class="spinner"></span>
    </button>
  </form>

  <p style="margin-top:16px;">
    New here?
    <a routerLink="/register" style="color:var(--accent);">Create an account</a>
  </p>
</div>
